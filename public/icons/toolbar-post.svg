<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 33 33" width="33" height="33">
  <!-- Post toolbar icon: pencil/pen on paper, #000099 -->
  <!-- Background -->
  <rect width="33" height="33" fill="#EEEEEE"/>
  <rect width="33" height="33" fill="none" stroke="#000099" stroke-width="1"/>
  <!-- Paper document -->
  <rect x="5" y="5" width="18" height="22" fill="none" stroke="#000099" stroke-width="1.5"/>
  <!-- Lines on paper -->
  <line x1="8" y1="10" x2="20" y2="10" stroke="#000099" stroke-width="1"/>
  <line x1="8" y1="14" x2="20" y2="14" stroke="#000099" stroke-width="1"/>
  <line x1="8" y1="18" x2="15" y2="18" stroke="#000099" stroke-width="1"/>
  <!-- Pencil body (diagonal) -->
  <rect x="17" y="14" width="5" height="13" rx="1" fill="#000099" transform="rotate(-45 19.5 20.5)"/>
  <!-- Pencil tip -->
  <polygon points="24,26 27,24 26,28" fill="#000099"/>
</svg>
