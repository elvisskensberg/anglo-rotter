<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Camera icon for threads with media -->
  <!-- Camera body -->
  <rect x="1" y="5" width="14" height="9" rx="1" fill="#000099"/>
  <!-- Viewfinder bump on top -->
  <rect x="5" y="3" width="6" height="3" rx="1" fill="#000099"/>
  <!-- Lens circle (outer) -->
  <circle cx="8" cy="9.5" r="3" fill="#AAAAFF" opacity="0.7"/>
  <!-- Lens circle (inner) -->
  <circle cx="8" cy="9.5" r="1.5" fill="#000099"/>
  <!-- Flash indicator dot -->
  <circle cx="12" cy="6.5" r="1" fill="#FFFFFF" opacity="0.8"/>
</svg>
